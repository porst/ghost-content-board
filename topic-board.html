    "why": "行天宮在IG發布掩魂儀式內容，屬於大眾熟悉的宮廟帳號，鬼老師對此有獨到見解，這類同業/KOL內容評論話題性高",
    "angle": "不批評對方，從專業角度提出自己的判斷與差異化觀點",
    "tags": [
      "同業評論",
      "行天宮",
      "掩魂儀式",
      "差異化"
    ],
    "status": "pending",
    "script": [
      {
        "q": "開場問題",
        "a": "行天宮最近發布的掩魂儀式，你看了之後有什麼想法？"
      },
      {
        "q": "追問方向1",
        "a": "從你的角度來看，你的做法跟他們公開的儀式，核心邏輯上最大的差異是什麼？"
      },
      {
        "q": "追問方向2",
        "a": "一般人如果看到不同宮廟、不同老師教的方式不一樣，要怎麼分辨哪個才是對的？"
      },
      {
        "q": "收尾引導",
        "a": "如果今天是你來處理掩魂/收驚這件事，你會怎麼做？"
      }
    ]
  }
];

// Free-form group feedback not tagged to any specific topic (via the LINE
// webhook — see api/line-webhook.js). Each entry: { text, sender, time }.
const unsorted = [
  {
    "text": "＃16 能除鬼當然也易招鬼，事物都是一體兩面的，只是不會操作的人，只知其一 不知其二",
    "sender": "U83159ac658d56172effb96a1b3af084f",
    "time": "2026-07-16T02:52:48.556Z"
  }
];

// Base URL of the Vercel deployment that serves the LINE webhook and the
// AI-regenerate / manual-edit endpoints below.
const API_BASE = "https://ghost-content-board.vercel.app";

let currentFilter = "all";
let scriptShown = {};
let historyShown = {};
let regeneratingId = null;
let editingId = null;
let editDraft = null; // array of the 4 edited "a" strings, index-aligned with topic.script
let savingEdit = false;

// This page has no login — anyone who finds the URL can view it, so the
// regenerate/edit endpoints are protected by a shared secret instead of
// real auth. Prompted once, then remembered in this browser via
// localStorage. Not real security (see api/api-helpers.mjs comment) but
// stops casual/accidental hits against an endpoint that costs money
// (Claude) and can rewrite repo content.
function getBoardToken() {
  let token = localStorage.getItem("boardEditToken");
  if (!token) {
    token = window.prompt("請輸入編輯密碼：") || "";
    if (token) localStorage.setItem("boardEditToken", token);
  }
  return token;
}

function clearBoardToken() {
  localStorage.removeItem("boardEditToken");
}

// A plain fetch() never resolves/rejects on a stalled connection, which is
// what left the "正在產生"/"儲存中" buttons stuck forever with no error
// shown — the try/catch/finally below was never reached. This bounds every
// request so the UI always recovers.
async function fetchWithTimeout(url, options, timeoutMs) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    return await fetch(url, { ...options, signal: controller.signal });
  } finally {
    clearTimeout(timer);
  }
}

function sourceLabel(source) {
  if (source === "ai") return "（AI 重新生成）";
  if (source === "manual") return "（手動編輯）";
  return "";
}

async function regenerateScript(id) {
  if (regeneratingId) return;
  const token = getBoardToken();
  if (!token) return;

  regeneratingId = id;
  render();

  try {
    // 65s: comfortably above api/regenerate-script.js's own 55s Claude
    // timeout plus the Vercel maxDuration (60s), so a real backend timeout
    // error surfaces before this client-side abort would otherwise fire.
    const res = await fetchWithTimeout(`${API_BASE}/api/regenerate-script`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Board-Token": token },
      body: JSON.stringify({ topicId: id }),
    }, 65000);
    if (res.status === 401) {
      clearBoardToken();
      alert("密碼錯誤，請重新輸入後再試一次。");
      return;
    }
    const data = await res.json();
    if (!res.ok) {
      alert("重新生成失敗：" + (data.error || res.status));
      return;
    }
    const idx = topics.findIndex(t => t.id === id);
    if (idx !== -1) topics[idx] = data.topic;
  } catch (err) {
    alert(err.name === "AbortError" ? "重新生成逾時，請稍後再試一次。" : "重新生成失敗：" + err.message);
  } finally {
    regeneratingId = null;
    render();
  }
}

function startEdit(id) {
  const t = topics.find(x => x.id === id);
  if (!t) return;
  editingId = id;
  editDraft = t.script.map(s => s.a);
  render();
}

function cancelEdit() {
  editingId = null;
  editDraft = null;
  render();
}

// Deliberately does NOT call render() — re-rendering the whole card list on
// every keystroke would wipe the textarea's focus/cursor position.
function updateDraft(index, value) {
  if (editDraft) editDraft[index] = value;
}

async function saveEdit(id) {
  if (savingEdit) return;
  const token = getBoardToken();
  if (!token) return;

  const t = topics.find(x => x.id === id);
  if (!t || !editDraft) return;
  const newScript = t.script.map((s, i) => ({ q: s.q, a: editDraft[i] }));

  savingEdit = true;
  render();

  try {
    // update-script.js is a plain Edge Function with no Claude call, so it
    // should never legitimately take long — a much shorter timeout than
    // regenerate's is enough here.
    const res = await fetchWithTimeout(`${API_BASE}/api/update-script`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Board-Token": token },
      body: JSON.stringify({ topicId: id, script: newScript }),
    }, 20000);
    if (res.status === 401) {
      clearBoardToken();
      alert("密碼錯誤，請重新輸入後再試一次。");
      return;
    }
    const data = await res.json();
    if (!res.ok) {
      alert("儲存失敗：" + (data.error || res.status));
      return;
    }
    const idx = topics.findIndex(x => x.id === id);
    if (idx !== -1) topics[idx] = data.topic;
    editingId = null;
    editDraft = null;
  } catch (err) {
    alert(err.name === "AbortError" ? "儲存逾時，請稍後再試一次。" : "儲存失敗：" + err.message);
  } finally {
    savingEdit = false;
    render();
  }
}

function toggleHistory(id) {
  historyShown[id] = !historyShown[id];
  render();
}

// Feedback text/sender come from LINE group messages — untrusted external
// input — so they must be escaped before landing in innerHTML.
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function formatFeedbackTime(iso) {
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso || "";
  return d.toLocaleString("zh-TW", { timeZone: "Asia/Taipei", hour12: false });
}

function renderFeedbackItems(list) {
  return list.map(f => `
    <div class="feedback-item">
      <div class="feedback-meta">${escapeHtml(f.sender || "")} · ${formatFeedbackTime(f.time)}</div>
      <div class="feedback-text">${escapeHtml(f.text || "")}</div>
    </div>
  `).join("");
}

function render() {
  const filtered = currentFilter === "all"
    ? topics.filter(t => t.status !== "archived")
    : currentFilter === "archived"
      ? topics.filter(t => t.status === "archived")
      : topics.filter(t => t.type === currentFilter && t.status !== "archived");

  // stats
  const total = topics.length;
  const pending = topics.filter(t => t.status === "pending").length;
  const selected = topics.filter(t => t.status === "selected").length;
  const shot = topics.filter(t => t.status === "shot").length;
  const posted = topics.filter(t => t.status === "posted").length;

  document.getElementById("statsRow").innerHTML = `
    <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">總主題數</div></div>
    <div class="stat-box"><div class="stat-num">${pending}</div><div class="stat-label">待選</div></div>
    <div class="stat-box"><div class="stat-num">${selected}</div><div class="stat-label">已選定</div></div>
    <div class="stat-box"><div class="stat-num">${shot}</div><div class="stat-label">已拍攝</div></div>
    <div class="stat-box"><div class="stat-num">${posted}</div><div class="stat-label">已發布</div></div>
  `;

  // filter bar
  const filters = [
    { key: "all", label: "全部" },
    { key: "explosive", label: "爆發型" },
    { key: "trust", label: "信任型" },
    { key: "crossover", label: "身份交叉" },
    { key: "commentary", label: "同業評論型" },
    { key: "archived", label: "已封存" }
  ];
  document.getElementById("filterBar").innerHTML = filters.map(f =>
    `<button class="filter-btn ${currentFilter === f.key ? 'active' : ''}" onclick="setFilter('${f.key}')">${f.label}</button>`
  ).join("");

  // unsorted discussion (not filtered by topic type)
  document.getElementById("unsortedSection").innerHTML = `
    <div class="unsorted-block">
      <div class="unsorted-header">💬 未分類討論 (${unsorted.length})</div>
      ${unsorted.length === 0
        ? `<div class="empty-state">目前沒有未分類的討論訊息</div>`
        : renderFeedbackItems(unsorted)}
    </div>
  `;

  // cards
  if (filtered.length === 0) {
    document.getElementById("cardList").innerHTML = `<div class="empty-state">這個分類目前沒有主題</div>`;
    return;
  }

  document.getElementById("cardList").innerHTML = filtered.map(t => {
    const badgeClass = t.type === "explosive" ? "badge-explosive" : t.type === "trust" ? "badge-trust" : t.type === "crossover" ? "badge-crossover" : "badge-commentary";
    const isShown = scriptShown[t.id];
    const feedback = t.feedback || [];
    const isArchived = t.status === "archived";
    const isEditingThis = editingId === t.id;
    const isRegeneratingThis = regeneratingId === t.id;
    const versions = t.scriptVersions || [];
    const isHistoryShown = historyShown[t.id];
    return `
    <div class="card ${isArchived ? 'archived' : ''}">
      <div class="card-header">
        <div class="card-title-row">
          <span class="card-id">#${t.id}</span>
          <div class="card-title">${t.title}</div>
        </div>
        <span class="badge ${badgeClass}">${t.typeLabel}</span>
      </div>

      <div class="card-section">
        <div class="card-label">為什麼現在熱</div>
        <div class="card-text">${t.why}</div>
      </div>

      <div class="card-section">
        <div class="card-label">建議切角</div>
        <div class="card-text">${t.angle}</div>
      </div>

      <div class="tag-row">
        ${t.tags.map(tag => `<span class="tag">${tag}</span>`).join("")}
      </div>

      <select class="status-select" onchange="updateStatus(${t.id}, this.value)">
        <option value="pending" ${t.status === "pending" ? "selected" : ""}>待選</option>
        <option value="selected" ${t.status === "selected" ? "selected" : ""}>已選定</option>
        <option value="shot" ${t.status === "shot" ? "selected" : ""}>已拍攝</option>
        <option value="posted" ${t.status === "posted" ? "selected" : ""}>已發布</option>
        <option value="archived" ${t.status === "archived" ? "selected" : ""}>已封存</option>
      </select>

      <button class="expand-btn" onclick="toggleScript(${t.id})">${isShown ? '收起訪談大綱 ▲' : '展開訪談大綱 ▼'}</button>

      <div class="script-box ${isShown ? 'show' : ''}">
        ${isEditingThis ? `
          ${t.script.map((s, i) => `
            <div class="script-item">
              <div class="script-q">${escapeHtml(s.q)}</div>
              <textarea class="script-edit-textarea" oninput="updateDraft(${i}, this.value)">${escapeHtml(editDraft[i])}</textarea>
            </div>
          `).join("")}
          <div class="script-actions">
            <button class="save-btn" onclick="saveEdit(${t.id})" ${savingEdit ? "disabled" : ""}>${savingEdit ? "儲存中…" : "儲存"}</button>
            <button class="cancel-btn" onclick="cancelEdit()" ${savingEdit ? "disabled" : ""}>取消</button>
          </div>
        ` : `
          ${t.script.map(s => `
            <div class="script-item">
              <div class="script-q">${escapeHtml(s.q)}</div>
              <div class="script-a">${escapeHtml(s.a)}</div>
            </div>
          `).join("")}
          <div class="script-actions">
            <button class="action-btn" onclick="startEdit(${t.id})">✏️ 編輯</button>
            <button class="action-btn" onclick="regenerateScript(${t.id})" ${isRegeneratingThis ? "disabled" : ""}>${isRegeneratingThis ? "生成中…" : "🔄 根據回饋重新生成"}</button>
          </div>
        `}

        ${versions.length > 1 ? `
          <button class="expand-btn" onclick="toggleHistory(${t.id})">${isHistoryShown ? '收起版本歷史 ▲' : `查看版本歷史 (${versions.length}) ▼`}</button>
          <div class="history-box ${isHistoryShown ? 'show' : ''}">
            ${versions.slice().reverse().map(v => `
              <div class="history-version">
                <div class="history-version-label">${escapeHtml(v.label)}${sourceLabel(v.source)}${v.createdAt ? ' · ' + formatFeedbackTime(v.createdAt) : ''}</div>
                ${v.script.map(s => `
                  <div class="script-item">
                    <div class="script-q">${escapeHtml(s.q)}</div>
                    <div class="script-a">${escapeHtml(s.a)}</div>
                  </div>
                `).join("")}
              </div>
            `).join("")}
          </div>
        ` : ""}
      </div>

      ${feedback.length > 0 ? `
      <div class="card-section feedback-section">
        <div class="card-label">意見回饋 (${feedback.length})</div>
        ${renderFeedbackItems(feedback)}
      </div>
      ` : ""}
    </div>
  `;
  }).join("");
}

function setFilter(key) {
  currentFilter = key;
  render();
}

function updateStatus(id, value) {
  const t = topics.find(x => x.id === id);
  if (t) t.status = value;
  render();
}

function toggleScript(id) {
  scriptShown[id] = !scriptShown[id];
  render();
}

render();
</script>

</body>
</html>
