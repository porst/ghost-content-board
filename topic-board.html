<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: #0f0f12;
    color: #e8e6e3;
    padding: 20px;
    max-width: 900px;
    margin: 0 auto;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 4px;
    color: #f0c987;
  }
  .subtitle {
    color: #8a8680;
    font-size: 13px;
    margin-bottom: 20px;
  }
  .stats {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat-box {
    background: #1a1a1f;
    border: 1px solid #2a2a30;
    border-radius: 8px;
    padding: 10px 14px;
    flex: 1;
    min-width: 80px;
    text-align: center;
  }
  .stat-num { font-size: 20px; font-weight: bold; color: #f0c987; }
  .stat-label { font-size: 11px; color: #8a8680; margin-top: 2px; }

  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: #1a1a1f;
    border: 1px solid #2a2a30;
    color: #b0aca6;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
  }
  .filter-btn.active {
    background: #f0c987;
    color: #0f0f12;
    border-color: #f0c987;
    font-weight: bold;
  }

  .card {
    background: #1a1a1f;
    border: 1px solid #2a2a30;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
  }
  .card-title {
    font-size: 15px;
    font-weight: bold;
    color: #fff;
    flex: 1;
  }
  .badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 12px;
    white-space: nowrap;
    font-weight: bold;
  }
  .badge-explosive { background: #4a2020; color: #ff8a8a; }
  .badge-trust { background: #1e3a2e; color: #8affb0; }
  .badge-crossover { background: #2e2a4a; color: #b0a8ff; }

  .status-select {
    background: #0f0f12;
    border: 1px solid #3a3a40;
    color: #e8e6e3;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 6px;
    margin-top: 8px;
  }

  .card-section {
    margin-top: 10px;
    font-size: 13px;
    line-height: 1.6;
  }
  .card-label {
    color: #8a8680;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
  }
  .card-text { color: #d0cdc8; }
  .tag-row {
    display: flex;
    gap: 6px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 10px;
    background: #26262c;
    color: #a8a49e;
    padding: 3px 8px;
    border-radius: 6px;
  }

  .expand-btn {
    background: none;
    border: none;
    color: #f0c987;
    font-size: 12px;
    cursor: pointer;
    margin-top: 10px;
    padding: 0;
  }
  .script-box {
    display: none;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed #3a3a40;
  }
  .script-box.show { display: block; }
  .script-item { margin-bottom: 8px; }
  .script-q { color: #f0c987; font-size: 12px; font-weight: bold; }
  .script-a { color: #c8c4bf; font-size: 12px; margin-top: 2px; }

  .empty-state {
    text-align: center;
    color: #6a6660;
    padding: 40px 20px;
    font-size: 13px;
  }
</style>
</head>

let currentFilter = "all";
let scriptShown = {};

function render() {
  const filtered = currentFilter === "all" ? topics : topics.filter(t => t.type === currentFilter);

  // stats
  const total = topics.length;
  const pending = topics.filter(t => t.status === "pending").length;
  const selected = topics.filter(t => t.status === "selected").length;
  const shot = topics.filter(t => t.status === "shot").length;
  const posted = topics.filter(t => t.status === "posted").length;

  document.getElementById("statsRow").innerHTML = `
    <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">總主題數</div></div>
    <div class="stat-box"><div class="stat-num">${pending}</div><div class="stat-label">待選</div></div>
    <div class="stat-box"><div class="stat-num">${selected}</div><div class="stat-label">已選定</div></div>
    <div class="stat-box"><div class="stat-num">${shot}</div><div class="stat-label">已拍攝</div></div>
    <div class="stat-box"><div class="stat-num">${posted}</div><div class="stat-label">已發布</div></div>
  `;

  // filter bar
  const filters = [
    { key: "all", label: "全部" },
    { key: "explosive", label: "爆發型" },
    { key: "trust", label: "信任型" },
    { key: "crossover", label: "身份交叉" }
  ];
  document.getElementById("filterBar").innerHTML = filters.map(f =>
    `<button class="filter-btn ${currentFilter === f.key ? 'active' : ''}" onclick="setFilter('${f.key}')">${f.label}</button>`
  ).join("");

  // cards
  if (filtered.length === 0) {
    document.getElementById("cardList").innerHTML = `<div class="empty-state">這個分類目前沒有主題</div>`;
    return;
  }

  document.getElementById("cardList").innerHTML = filtered.map(t => {
    const badgeClass = t.type === "explosive" ? "badge-explosive" : t.type === "trust" ? "badge-trust" : "badge-crossover";
    const isShown = scriptShown[t.id];
    return `
    <div class="card">
      <div class="card-header">
        <div class="card-title">${t.title}</div>
        <span class="badge ${badgeClass}">${t.typeLabel}</span>
      </div>

      <div class="card-section">
        <div class="card-label">為什麼現在熱</div>
        <div class="card-text">${t.why}</div>
      </div>

      <div class="card-section">
        <div class="card-label">建議切角</div>
        <div class="card-text">${t.angle}</div>
      </div>

      <div class="tag-row">
        ${t.tags.map(tag => `<span class="tag">${tag}</span>`).join("")}
      </div>

      <select class="status-select" onchange="updateStatus(${t.id}, this.value)">
        <option value="pending" ${t.status === "pending" ? "selected" : ""}>待選</option>
        <option value="selected" ${t.status === "selected" ? "selected" : ""}>已選定</option>
        <option value="shot" ${t.status === "shot" ? "selected" : ""}>已拍攝</option>
        <option value="posted" ${t.status === "posted" ? "selected" : ""}>已發布</option>
      </select>

      <button class="expand-btn" onclick="toggleScript(${t.id})">${isShown ? '收起訪談大綱 ▲' : '展開訪談大綱 ▼'}</button>

      <div class="script-box ${isShown ? 'show' : ''}">
        ${t.script.map(s => `
          <div class="script-item">
            <div class="script-q">${s.q}</div>
            <div class="script-a">${s.a}</div>
          </div>
        `).join("")}
      </div>
    </div>
  `;
  }).join("");
}

function setFilter(key) {
  currentFilter = key;
  render();
}

function updateStatus(id, value) {
  const t = topics.find(x => x.id === id);
  if (t) t.status = value;
  render();
}

function toggleScript(id) {
  scriptShown[id] = !scriptShown[id];
  render();
}

render();
</script>

</body>
</html>
